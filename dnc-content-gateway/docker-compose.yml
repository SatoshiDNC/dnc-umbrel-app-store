version: "3.7"
services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: dnc-content-gateway_server_1
      APP_PORT: 8077
      PROXY_AUTH_WHITELIST: "/api/v1/*"

  server:
    env_file:
      - ${APP_DATA_DIR}/data/env
    image: ghcr.io/rleed/umbrel-content-gateway:latest
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    init: true
    volumes:
      - ${APP_DATA_DIR}/data:/data
